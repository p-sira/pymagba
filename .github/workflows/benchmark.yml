name: PyMagba Benchmarks

on:
  workflow_dispatch:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for asv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install asv
        run: uv add asv

      - name: Machine info
        run: uv run asv machine --yes

      - name: Run benchmarks and test regressions
        run: |
          uv run asv continuous origin/main HEAD
          uv run asv compare origin/main HEAD --factor 1.05

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: asv-results
          path: .asv/results
