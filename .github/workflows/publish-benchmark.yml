name: Build and Deploy to Cloudflare
on:
    push:
        branches:
            - asv

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout asv branch
              uses: actions/checkout@v4
            - name: Install uv
              uses: astral-sh/setup-uv@v5
            - name: Cache Python dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/uv
                      .venv
                  key: ${{ runner.os }}-python-${{ hashFiles('uv.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-python-
            - name: Install asv
              run: uv add asv
            - name: Generate ASV HTML
              run: |
                  mkdir -p .asv
                  cp -r results .asv/
                  uv run asv publish
            - name: Build Benchmark Docs
              run: |
                  cd docs
                  uv run make html
                  mkdir -p build/html/
                  cp -r ../.asv/html/* build/html/
            - name: Commit and push
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add build/html/
                  git commit -m "Update benchmark results: ${GITHUB_SHA::8}"
                  git push origin asv
